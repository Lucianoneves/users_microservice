apiVersion: apps/v1
kind: Deployment
metadata:
  name: users_microservice
  labels:
    app: users_microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users_microservice
  template:
    metadata:
      labels:
        app: users_microservice
    spec:
      containers:
        - name: users_microservice
          image: registry.example.com/users_microservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgres://admin:s3cr3t-prod-password@db:5432/app"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: users_microservice
spec:
  type: ClusterIP
  selector:
    app: users_microservice
  ports:
    - port: 80
      targetPort: 8080
